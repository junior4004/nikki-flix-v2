        .pill-btn { background: linear-gradient(180deg, #1e40af, #1e3a8a); border: 2px solid #3b82f6; padding: 18px 50px; border-radius: 50px; color: white; font-weight: 800; cursor: pointer; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }

        .seat-tag { position: absolute; background: rgba(0,0,0,0.9); border: 1px solid var(--gold); padding: 6px 15px; border-radius: 20px; font-size: 12px; transform: translate(-50%, -50%); cursor: pointer; transition: 0.2s; pointer-events: auto; }
        .seat-tag:hover { background: var(--gold); color: black; }

        /* SLOTS UI */

        .pots-row { display: flex; gap: 40px; margin-bottom: 30px; }
        .pot { width: 100px; height: 100px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .reel-grid { display: grid; grid-template-columns: repeat(5, 110px); gap: 12px; background: rgba(0,0,0,0.8); padding: 20px; border: 4px solid var(--gold); border-radius: 15px; }
        .reel-col { height: 330px; background: #fff; border-radius: 8px; overflow: hidden; position: relative; }
        .slot-sym { height: 110px; display: flex; align-items: center; justify-content: center; font-size: 60px; color: #000; }
        .spin-btn { width: 110px; height: 110px; background: radial-gradient(#ff0000, #800000); border: 5px solid #fff; border-radius: 50%; color: #fff; font-weight: 900; cursor: pointer; margin-top: 40px; box-shadow: 0 0 25px rgba(255,0,0,0.5); }

        #exit-btn { position: absolute; top: 100px; left: 40px; background: #222; padding: 12px 25px; border-radius: 8px; cursor: pointer; z-index: 3000; font-weight: bold; border: 1px solid #444; }
    </style>
</head>
