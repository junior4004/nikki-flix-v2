 
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NikkiFlix</title>
    <style>
        body {
            background-color: #141414;
            color: white;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            font-size: 3.5vw;
            font-weight: 500;
            margin-bottom: 30px;
        }
        .profile-container {
            display: flex;
            gap: 30px;
        }
        .profile {
            text-align: center;
            cursor: pointer;
            width: 150px;
        }
        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 4px;
            background-size: cover;
            background-position: center;
            border: 3px solid transparent;
            transition: border 0.2s;
        }
        /* Profile 1: Reddish Brown Hair */
        .avatar-red-brown {
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/f/fb/Netflix-avatar.png');
        }
        /* Profile 2: Black Hair */
        .avatar-black-hair {
            background-image: url('https://occ-0-116-114.1.nflxso.net/dnm/api/v6/K6hjPJd6cR6FpVELC5Pd6ovHRSk/AAAABTYctxxbe-cy9QZSQIP4iXfsW_OBRt6596-C237r7o20Ssh8kU6q8u8s6E2YIasj_D55376IqD541VId7kAsuTyeE237T1q7_g.png?r=8f7');
        }
        .profile:hover .avatar {
            border-color: white;
        }
        .name {
            margin-top: 15px;
            color: grey;
            font-size: 1.2vw;
        }
        .profile:hover .name {
            color: white;
        }
        .manage-button {
            margin-top: 60px;
            background: transparent;
            color: grey;
            border: 1px solid grey;
            padding: 10px 25px;
            cursor: pointer;
            font-size: 1.1vw;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .manage-button:hover {
            color: white;
            border-color: white;
        }
    </style>
</head>
<body>

    <h1>Who's watching?</h1>

    <div class="profile-container">
        <div class="profile">
            <div class="avatar avatar-red-brown"></div>
            <div class="name">Nicole</div>
        </div>

        <div class="profile">
            <div class="avatar avatar-black-hair"></div>
            <div class="name">Guest</div>
        </div>
    </div>

    <button class="manage-button">Manage Profiles</button>

</body>
</html>
