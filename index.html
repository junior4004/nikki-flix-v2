<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIKKIFLIX EMPIRE | 2026 CASINO SUITE V2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root { 
            --gold: #c5a059; 
            --red: #af0404; 
            --glass: rgba(10, 10, 10, 0.9);
            --border: 1px solid rgba(197, 160, 89, 0.5);
        }
        body { margin: 0; background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        /* SIDEBAR NAVIGATION */
        #sidebar {
            position: fixed; left: 0; top: 0; bottom: 0; width: 240px;
            background: #000; border-right: var(--border); z-index: 1000; padding: 20px;
            display: flex; flex-direction: column; gap: 10px;
        }
        .nav-header { color: var(--gold); font-size: 12px; letter-spacing: 2px; margin-bottom: 20px; text-align: center; font-weight: bold; }
        .nav-item {
            padding: 12px; border-radius: 4px; background: rgba(255,255,255,0.05);
            color: #bbb; cursor: pointer; text-transform: uppercase; font-size: 11px; transition: 0.3s;
        }
        .nav-item:hover, .nav-active { background: var(--gold); color: #000; font-weight: bold; }

        /* CHAT BOX */
        #social-panel {
            position: fixed; right: 20px; bottom: 20px; width: 300px; height: 350px;
            background: var(--glass); border: var(--border); border-radius: 8px;
            z-index: 1000; display: flex; flex-direction: column;
        }
        #chat-window { flex: 1; padding: 15px; overflow-y: auto; font-size: 12px; color: #ccc; }
        .msg .name { color: var(--gold); font-weight: bold; }

        /* GAMEPLAY BUTTONS */
        #game-controls {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 1100; display: flex; flex-direction: column; align-items: center; gap: 15px;
        }
        .action-row { display: flex; gap: 10px; }
        .btn-casino {
            background: linear-gradient(180deg, #c5a059, #8e7037);
            border: none; padding: 12px 25px; border-radius: 5px;
            font-weight: bold; cursor: pointer; color: #000; min-width: 100px;
        }
        .btn-fold { background: #444; color: white; }
        .btn-deal { background: #af0404; color: white; padding: 15px 40px; font-size: 1.2em; }

        #top-hud {
            position: fixed; top: 20px; left: 260px; right: 40px;
            display: flex; justify-content: space-between; align-items: center; z-index: 900;
        }
        .balance { font-size: 24px; color: var(--gold); font-weight: bold; text-shadow: 0 0 10px rgba(197,160,89,0.5); }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="nav-header">NIKKIFLIX EMPIRE</div>
        <div class="nav-item nav-active" onclick="moveTo('lobby')">Lobby</div>
        <div class="nav-item" onclick="moveTo('table1')">High Roller Poker</div>
        <div class="nav-item" onclick="moveTo('table3')">Blackjack Table</div>
        <div class="nav-item" onclick="moveTo('slots')">Slots Area</div>
    </div>

    <div id="top-hud">
        <h1 id="room-name">GRAND CASINO LOBBY</h1>
        <div class="balance">$<span id="bal-val">100,000</span></div>
    </div>

    <div id="social-panel">
        <div style="padding:10px; border-bottom: var(--border); font-size:10px; color:var(--gold);">LIVE TABLE CHAT</div>
        <div id="chat-window"></div>
    </div>

    <div id="game-controls">
        <div class="action-row" id="betting-ui" style="display:none;">
            <button class="btn-casino btn-fold" onclick="foldHand()">FOLD</button>
            <button class="btn-casino" onclick="action('Call')">CALL</button>
            <button class="btn-casino" onclick="action('Raise')">RAISE</button>
        </div>
        <div class="action-row">
            <button class="btn-casino btn-deal" id="deal-btn" onclick="dealPhysicalCards()">DEAL HAND</button>
            <div id="ptt-btn" style="background:#222; width:50px; height:50px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; border:1px solid var(--gold);">🎤</div>
        </div>
    </div>

    <script>
        /** SCENE SETUP **/
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        scene.fog = new THREE.Fog(0x050505, 10, 50);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // Better Lighting
        const ambient = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambient);

        const sun = new THREE.DirectionalLight(0xc5a059, 0.8);
        sun.position.set(5, 10, 7);
        scene.add(sun);

        // Floor (Polished)
        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(100, 100),
            new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.1, metalness: 0.5 })
        );
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        /** TABLE CONSTRUCTION **/
        function createTable(x, z, color, name) {
            const tableGroup = new THREE.Group();
            
            // Table Top
            const top = new THREE.Mesh(
                new THREE.CylinderGeometry(5, 5, 0.5, 32),
                new THREE.MeshStandardMaterial({ color: color, roughness: 0.8 })
            );
            tableGroup.add(top);

            // The Rail
            const rail = new THREE.Mesh(
                new THREE.TorusGeometry(5, 0.3, 16, 100),
                new THREE.MeshStandardMaterial({ color: 0x000000 })
            );
            rail.rotation.x = Math.PI/2;
            rail.position.y = 0.3;
            tableGroup.add(rail);

            // Dealer Bust
            const dealer = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.5, 2, 0.8), new THREE.MeshStandardMaterial({color:0x111111}));
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.5), new THREE.MeshStandardMaterial({color:0xdbac98}));
            head.position.y = 1.3;
            dealer.add(body, head);
            dealer.position.set(0, 1, -4);
            tableGroup.add(dealer);

            // Table Spotlight
            const spot = new THREE.SpotLight(0xffffff, 1);
            spot.position.set(0, 10, 0);
            spot.target = top;
            tableGroup.add(spot);

            tableGroup.position.set(x, 0, z);
            scene.add(tableGroup);
            return tableGroup;
        }

        const pokerTable = createTable(0, 0, 0x076324, "POKER");
        const bjTable = createTable(15, 0, 0x003366, "BLACKJACK");

        /** PHYSICAL CARD SYSTEM **/
        let myCards = [];
        function create3DCard(val, suit, isRed) {
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 180;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'white'; ctx.fillRect(0,0,128,180);
            ctx.fillStyle = isRed ? '#af0404' : 'black';
            ctx.font = 'bold 40px Arial'; ctx.fillText(val, 10, 40);
            ctx.font = '60px Arial'; ctx.fillText(suit, 35, 110);
            
            const tex = new THREE.CanvasTexture(canvas);
            const cardGeo = new THREE.BoxGeometry(0.7, 0.01, 1);
            const cardMat = [
                new THREE.MeshStandardMaterial({color:0xcccccc}), // sides
                new THREE.MeshStandardMaterial({color:0xcccccc}), 
                new THREE.MeshStandardMaterial({map: tex}),      // top
                new THREE.MeshStandardMaterial({color:0xaf0404}), // back
                new THREE.MeshStandardMaterial({color:0xcccccc}),
                new THREE.MeshStandardMaterial({color:0xcccccc})
            ];
            return new THREE.Mesh(cardGeo, cardMat);
        }

        function dealPhysicalCards() {
            // Hide Deal Button, Show Actions
            document.getElementById('deal-btn').style.display = 'none';
            document.getElementById('betting-ui').style.display = 'flex';

            // Clear old cards
            myCards.forEach(c => scene.remove(c));
            myCards = [];

            const cardData = [
                {v:'A', s:'♠', r:false},
                {v:'K', s:'♦', r:true}
            ];

            cardData.forEach((data, i) => {
                const card = create3DCard(data.v, data.s, data.r);
                card.position.set(0, 0.5, -3); // Start at dealer
                scene.add(card);
                myCards.push(card);

                // Slide Animation
                gsap.to(card.position, {
                    x: -0.5 + (i * 1.2),
                    y: 0.4,
                    z: 3,
                    duration: 0.8,
                    delay: i * 0.2,
                    ease: "power2.out"
                });
                
                // Flip Animation
                card.rotation.x = Math.PI; // Face down
                gsap.to(card.rotation, {
                    x: 0,
                    duration: 0.5,
                    delay: 0.5 + (i * 0.2)
                });
            });

            addChat("Dealer", "Cards dealt. Your action?");
        }

        function foldHand() {
            myCards.forEach((card, i) => {
                gsap.to(card.position, {
                    x: 0, z: -1, y: 0.4, duration: 0.5
                });
                gsap.to(card.material[2], { opacity: 0, duration: 0.5 });
            });
            setTimeout(() => {
                document.getElementById('deal-btn').style.display = 'block';
                document.getElementById('betting-ui').style.display = 'none';
            }, 600);
            addChat("You", "Fold.");
        }

        function action(type) {
            addChat("You", type + ".");
            // Logic for betting would go here
        }

        /** CAMERA NAVIGATION **/
        function moveTo(loc) {
            if(loc === 'table1') {
                gsap.to(camera.position, { x: 0, y: 6, z: 8, duration: 2 });
                gsap.to(controls.target, { x: 0, y: 0, z: 0, duration: 2 });
                document.getElementById('room-name').innerText = "HIGH ROLLER POKER";
            } else if(loc === 'lobby') {
                gsap.to(camera.position, { x: 10, y: 20, z: 25, duration: 2 });
                gsap.to(controls.target, { x: 0, y: 0, z: 0, duration: 2 });
                document.getElementById('room-name').innerText = "GRAND CASINO LOBBY";
            }
        }

        function addChat(user, msg) {
            const win = document.getElementById('chat-window');
            win.innerHTML += `<div class="msg"><span class="name">${user}:</span> ${msg}</div>`;
            win.scrollTop = win.scrollHeight;
        }

        // Initial View
        camera.position.set(10, 20, 25);
        addChat("System", "Welcome back, Nikki.");

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
