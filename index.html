
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NikkiFlix</title>
    <style>
        body {
            background-color: #141414;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            font-size: 45px;
            margin-bottom: 40px;
        }
        .profile-container {
            display: flex;
            gap: 30px;
        }
        .profile {
            text-align: center;
            width: 150px;
            cursor: pointer;
        }
        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 4px;
            margin-bottom: 15px;
            border: 3px solid transparent;
            transition: border 0.2s;
        }
        .nicole-avatar {
            background-color: #8B4513;
        }
        .guest-avatar {
            background-color: #333333;
            border: 1px solid #444;
        }
        .name {
            color: #808080;
            font-size: 20px;
            transition: color 0.2s;
        }
        .profile:hover .avatar {
            border-color: white;
        }
        .profile:hover .name {
            color: white;
        }
        .manage-button {
            margin-top: 60px;
            background: transparent;
            color: #808080;
            border: 1px solid #808080;
            padding: 10px 25px;
            cursor: pointer;
            font-size: 18px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <h1>Who's watching?</h1>
    <div class="profile-container">
        <div class="profile">
            <div class="avatar nicole-avatar"></div>
            <div class="name">Nicole</div>
        </div>
        <div class="profile">
            <div class="avatar guest-avatar"></div>
            <div class="name">Guest</div>
        </div>
    </div>
    <button class="manage-button">MANAGE PROFILES</button>
</body>
</html>
