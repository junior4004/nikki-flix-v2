<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIKKIFLIX PRO 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #presentation-layer { position: fixed; inset: 0; z-index: 200; background: #000; display: flex; align-items: center; justify-content: center; }
        #start-btn { padding: 25px 50px; background: #E50914; color: white; border: none; border-radius: 60px; font-size: 1.2rem; font-weight: bold; cursor: pointer; z-index: 300; box-shadow: 0 0 30px #E50914; }
        #main-ui { display: none; height: 100vh; flex-direction: column; }
        header { height: 60px; border-bottom: 2px solid #E50914; display: flex; align-items: center; padding: 0 20px; justify-content: space-between; background: #080808; }
        .container { display: flex; flex: 1; }
        .sidebar { width: 80px; border-right: 1px solid #222; display: flex; flex-direction: column; align-items: center; padding-top: 20px; background: #050505; }
        .nav-icon { font-size: 30px; margin: 20px 0; cursor: pointer; background: none; border: none; color: #fff; opacity: 0.6; transition: 0.3s; }
        .nav-icon:hover { opacity: 1; color: #E50914; }
        #content { flex: 1; background: #111; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
        .room-padding { padding: 40px; }
        .stat-box { background: #222; padding: 5px 15px; border-radius: 5px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

<div id="presentation-layer">
    <button id="start-btn" onclick="beginGrandPresentation()">INITIALIZE NIKKIFLIX</button>
</div>

<div id="main-ui">
    <header>
        <div style="color:#E50914; font-weight:900; font-size:26px; letter-spacing:2px;">NIKKIFLIX</div>
        <div style="display:flex; gap:15px; align-items:center;">
            <div class="stat-box" style="color:#FFD700;">GC: 50,000</div>
            <div class="stat-box" style="color:#00FA9A;">SC: 1.00 🔒</div>
            <div style="width:35px; height:35px; border-radius:50%; background:#E50914; border:2px solid #fff;"></div>
        </div>
    </header>
    <div class="container">
        <div class="sidebar">
            <button class="nav-icon" title="Theater" onclick="show('theater')">🎬</button>
            <button class="nav-icon" title="Casino" onclick="show('casino')">🎰</button>
            <button class="nav-icon" title="Poker" onclick="show('poker')">♠️</button>
        </div>
        <div id="content">
            <div id="view-theater" class="room-padding">
                <h2 style="color:#E50914;">PREMIUM THEATER</h2>
                <div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap:20px; margin-top:20px;">
                    <div style="height:280px; background:#222; border-radius:8px; display:flex; align-items:center; justify-content:center;">MOVIE 1</div>
                    <div style="height:280px; background:#222; border-radius:8px; display:flex; align-items:center; justify-content:center;">MOVIE 2</div>
                </div>
            </div>
            <div id="view-casino" style="display:none; height:100%;">
                <iframe src="https://demogamesfree.pragmaticplay.net/gs2c/html5Game.do?extGame=1&symbol=vs20sugarrush&lang=en&cur=USD"></iframe>
            </div>
            <div id="view-poker" style="display:none;" class="room-padding">
                <h2 style="color:#E50914;">3D TALKING TABLES</h2>
                <div style="height:200px; background:radial-gradient(#004400, #002200); border:4px solid #555; border-radius:100px; display:flex; align-items:center; justify-content:center;">POKER TABLE ACTIVE</div>
            </div>
        </div>
    </div>
</div>

<script>
let scene, camera, renderer, avatarNicole, avatarPromise;

function init3D() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(0, 3, 10);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('presentation-layer').appendChild(renderer.domElement);

    const floor = new THREE.Mesh(new THREE.PlaneGeometry(20, 10), new THREE.MeshStandardMaterial({color: 0x111111}));
    floor.rotation.x = -Math.PI/2;
    scene.add(floor);

    const curtain = new THREE.Mesh(new THREE.PlaneGeometry(30, 15), new THREE.MeshStandardMaterial({color: 0x800000}));
    curtain.position.set(0, 7, -5);
    scene.add(curtain);

    avatarNicole = new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 1.5), new THREE.MeshStandardMaterial({color: 0xE50914}));
    avatarNicole.position.set(-2, 1, -2);
    scene.add(avatarNicole);

    avatarPromise = new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 1.5), new THREE.MeshStandardMaterial({color: 0x00FA9A}));
    avatarPromise.position.set(2, 1, -2);
    scene.add(avatarPromise);

    scene.add(new THREE.AmbientLight(0xffffff, 0.8));
    animate();
}

const script = [
    { name: "Nicole", text: "Welcome to Nikki Flix. I'm Nicole.", pitch: 0.85 },
    { name: "Promise", text: "And I am Promise! We're here to guide your high roller experience.", pitch: 1.2 },
    { name: "Nicole", text: "Rule number one: Watch one ad to start, then enjoy total privacy all night.", pitch: 0.85 },
    { name: "Promise", text: "Exactly! No interruptions in the theater or at the tables. Let's begin!", pitch: 1.2 }
];

let lineIndex = 0;
function speak() {
    if(lineIndex >= script.length) {
        document.getElementById('presentation-layer').style.display = 'none';
        document.getElementById('main-ui').style.display = 'flex';
        return;
    }
    const line = script[lineIndex];
    const utter = new SpeechSynthesisUtterance(line.text);
    const voices = window.speechSynthesis.getVoices();
    const femaleVoice = voices.find(v => v.name.includes('Female') || v.name.includes('Google US English')) || voices[0];
    utter.voice = femaleVoice;
    utter.pitch = line.pitch;
    utter.rate = 0.95;
    utter.onend = () => { lineIndex++; setTimeout(speak, 600); };
    window.speechSynthesis.speak(utter);
}

function beginGrandPresentation() {
    document.getElementById('start-btn').style.display = 'none';
    init3D();
    window.speechSynthesis.getVoices();
    speak();
}

function animate() {
    requestAnimationFrame(animate);
    if(avatarNicole) avatarNicole.rotation.y += 0.01;
    if(avatarPromise) avatarPromise.rotation.y += 0.01;
    renderer.render(scene, camera);
}

function show(room) {
    ['theater', 'casino', 'poker'].forEach(r => {
        document.getElementById('view-' + r).style.display = (r === room) ? 'block' : 'none';
    });
}
</script>
</body>
</html>
