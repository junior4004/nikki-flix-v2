 
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NikkiFlix</title>
    <style>
        body {
            background-color: #141414;
            color: white;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        h1 {
            font-size: 3.5vw;
            font-weight: 500;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }
        .profile-container {
            display: flex;
            gap: 40px;
        }
        .profile {
            text-align: center;
            cursor: pointer;
            width: 150px;
        }
        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 4px;
            position: relative;
            box-sizing: border-box;
            border: 3px solid transparent;
            transition: border 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* Profile 1: Reddish Brown Hair representation */
        .avatar-nicole {
            background-color: #8B4513; 
        }
        /* Profile 2: Black Hair representation */
        .avatar-guest {
            background-color: #000000;
            border: 1px solid #333;
        }
        .profile:hover .avatar {
            border-color: #e5e5e5;
        }
        .name {
            margin-top: 15px;
            color: #808080;
            font-size: 1.2vw;
            transition: color 0.2s;
        }
        .profile:hover .name {
            color: #fff;
        }
        .manage-button {
            margin-top: 80px;
            background: transparent;
            color: #808080;
            border: 1px solid #808080;
            padding: 10px 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            font-size: 1.1vw;
            transition: all 0.2s;
        }
        .manage-button:hover {
            color: #fff;
            border-color: #fff;
        }
    </style>
</head>
<body>

    <h1>Who's watching?</h1>

    <div class="profile-container">
        <div class="profile" onclick="location.reload()">
            <div class="avatar avatar-nicole"></div>
            <div class="name">Nicole</div>
        </div>

        <div class="profile" onclick="location.reload()">
            <div class="avatar avatar-guest"></div>
            <div class="name">Guest</div>
        </div>
    </div>

    <button class="manage-button">Manage Profiles</button>

</body>
</html>
